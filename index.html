<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeslaSys Chile</title>
</head>
<body>
    <h1>TeslaSys Chile</h1>
    <h2>Sistema de Registro de Solicitudes de Soporte</h2>
    <form id="formulario">
        
        Nombre del colaborador:<br>
        <input type="text" id="nombre"><br><br>
        
        Correo electrónico:<br>
        <input type="email" id="correo"><br><br>
        
        Área de trabajo:<br>
        <input type="text" id="area"><br><br>
        
        Tipo de solicitud:<br>
        <select id="tipo_solicitud">
            <option value="">Seleccione una opción...</option>
            <option value="Hardware">Hardware</option>
            <option value="Software">Software</option>
            <option value="Redes">Redes</option>
            <option value="Seguridad">Seguridad</option>
        </select><br><br>
        
        Descripción de la solicitud:<br>
        <textarea id="descripcion" placeholder="Descripción de la solicitud..."></textarea><br><br>
        
        <button type="submit" id="registrar">Registrar</button>
        <button type="button" id="limpiar">Limpiar</button>
    </form>

    <p id="mensaje_pantalla" style="font-weight: bold;"></p>
    <hr>
    <h2>Solicitudes Registradas</h2>
    <table border="1" style ="width: 100%; text-align: left;">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Área</th>
                <th>Tipo de Solicitud</th>
                <th>Descripción</th>
            </tr>
        </thead>
        <tbody id="cuerpo_tabla">
        </tbody>
    </table>

    <script>
        let Solicitudes = [];

        function registrarSolicitud(event) {
            event.preventDefault();
            
            let cajaMensaje = document.getElementById("mensaje_pantalla");
            let nombre = document.getElementById("nombre").value.trim();
            let correo = document.getElementById("correo").value.trim();
            let area = document.getElementById("area").value.trim();
            let tipo_solicitud = document.getElementById("tipo_solicitud").value.trim();
            let descripcion = document.getElementById("descripcion").value.trim();

            if (nombre === "" || correo === "" || area === "" || tipo_solicitud === "" || descripcion === "") {
                cajaMensaje.style.color = "red";
                cajaMensaje.textContent = "Advertencia: Ningún campo puede quedar vacío.";
                return; 
            }
            
            else if (!correo.includes("@")) {
                cajaMensaje.style.color = "red";
                cajaMensaje.textContent = "Advertencia: El correo debe contener el símbolo @.";
            }
            else{
                let nuevaSolicitud = {
                    nombre: nombre,
                    correo: correo,
                    area: area,
                    tipo: tipo_solicitud,
                    descripcion: descripcion
                };
                
            Solicitudes.push(nuevaSolicitud);

            cajaMensaje.style.color = "green";
            cajaMensaje.textContent = "Solicitud registrada exitosamente. (Total guardadas: " + Solicitudes.length + ")";

            document.getElementById("formulario").reset();
            console.log("Arreglo de Solicitudes:", Solicitudes);
            actualizarTabla();
            }
        }
        function limpiarFormulario() {
            document.getElementById("formulario").reset();
            document.getElementById("mensaje_pantalla").textContent = "";
        }
        document.getElementById("formulario").addEventListener("submit", registrarSolicitud);
        document.getElementById("limpiar").addEventListener("click", limpiarFormulario);

        function actualizarTabla() {
            let cuerpoTabla = document.getElementById("cuerpo_tabla");
            cuerpoTabla.innerHTML = "";
            for (let i=0; i<Solicitudes.length; i++) {
                let solicitud = Solicitudes[i];
                let fila = "<tr>" +
                    "<td>" + solicitud.nombre + "</td>" +
                    "<td>" + solicitud.correo + "</td>" +
                    "<td>" + solicitud.area + "</td>" +
                    "<td>" + solicitud.tipo + "</td>" +
                    "<td>" + solicitud.descripcion + "</td>" +
                    "</tr>";
                cuerpoTabla.innerHTML += fila;
            }
        }
    </script>
</body>
</html>
